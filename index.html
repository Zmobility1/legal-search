<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Database Search | Corporate Internal Tool</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --promo-bg: #1e1b4b;
            --promo-border: #4338ca;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .header { padding: 32px 32px 24px 32px; border-bottom: 1px solid var(--border-color); }
        .header h1 { margin: 0; font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header p { margin: 6px 0 0 0; font-size: 14px; color: var(--text-muted); }
        .search-box { padding: 32px; display: flex; gap: 14px; background: rgba(255, 255, 255, 0.01); border-bottom: 1px solid var(--border-color); }
        .input-wrapper { flex: 1; }
        input {
            width: 100%; box-sizing: border-box; padding: 18px 20px; border: 1px solid var(--border-color);
            border-radius: 10px; font-size: 17px; background: var(--bg-input); color: var(--text-main); transition: all 0.2s ease;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .search-btn {
            width: 58px; height: 58px; padding: 0; border: none; border-radius: 10px; background: var(--primary);
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .search-btn:hover { background: var(--primary-hover); }
        .search-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .status { padding: 12px 32px; font-size: 13px; font-weight: 500; color: var(--text-muted); background: rgba(0,0,0,0.1); border-bottom: 1px solid var(--border-color); }
        .result-container { padding: 32px; min-height: 200px; }
        .profile-card { background: var(--bg-main); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; animation: fadeIn 0.3s ease-in-out; }
        .profile-header { background: rgba(255, 255, 255, 0.02); padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .profile-name { font-size: 18px; font-weight: 600; }
        .profile-meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .copy-btn { background: #334155; color: #f1f5f9; border: 1px solid #475569; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .profile-body { padding: 24px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .info-item label { display: block; font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .info-item .value { font-size: 15px; font-weight: 500; }
        .number-tag { display: inline-block; background: var(--border-color); padding: 4px 10px; border-radius: 6px; font-size: 14px; margin-right: 6px; font-family: monospace; }
        .placeholder-text { color: var(--text-muted); text-align: center; padding: 40px 0; }
        .history { padding: 20px 32px; background: rgba(0, 0, 0, 0.1); border-top: 1px solid var(--border-color); }
        .history-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
        .tag { display: inline-block; padding: 6px 12px; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 20px; font-size: 13px; margin: 4px; cursor: pointer; }
        .promo-banner { background: var(--promo-bg); border-top: 1px solid var(--promo-border); padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .promo-text h4 { margin: 0; font-size: 14px; color: #e0e7ff; }
        .promo-text p { margin: 4px 0 0 0; font-size: 12px; color: #a5b4fc; }
        .promo-link { background: #4f46e5; color: white; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Corporate Database Search</h1>
        <p>Internal Verification Tool — Identity & Contact Verification</p>
    </div>

    <div class="search-box">
        <div class="input-wrapper">
            <input type="text" id="number" placeholder="Enter CNIC or Phone Number" autofocus autocomplete="off">
        </div>
        <button class="search-btn" onclick="searchData()" aria-label="Search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </div>

    <div id="status" class="status">● System Ready</div>
    
    <div class="result-container" id="result-container">
        <div class="placeholder-text">Results will be displayed here beautifully after execution.</div>
    </div>

    <div class="history">
        <div class="history-title">Recent Queries</div>
        <div id="history-list"></div>
    </div>

    <div class="promo-banner">
        <div class="promo-text">
            <h4>Want to search records faster on mobile?</h4>
            <p>Download the official ZobiTech Android Utility Tool App.</p>
        </div>
        <a href="https://rebrand.ly/zobitech" target="_blank" class="promo-link">Download App</a>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
